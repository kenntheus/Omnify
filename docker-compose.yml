version: '3.9'

services:
  # ─── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: omnify-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: omnify_secret
      MONGO_INITDB_DATABASE: omnify
    networks:
      - omnify-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnify-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:omnify_secret@mongodb:27017/omnify?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_very_long_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh_secret}
      JWT_EXPIRE: 1d
      JWT_REFRESH_EXPIRE: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - omnify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── AI Service ─────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: omnify-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      PORT: 8000
      BACKEND_URL: http://backend:5000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      - omnify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:5000}
        NEXT_PUBLIC_AI_SERVICE_URL: ${AI_SERVICE_URL:-http://localhost:8000}
    container_name: omnify-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:5000}
      NEXT_PUBLIC_AI_SERVICE_URL: ${AI_SERVICE_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - omnify-network

volumes:
  mongodb_data:
    driver: local
  uploads:
    driver: local

networks:
  omnify-network:
    driver: bridge
