services:
  # ─── AI Service (Python / FastAPI) ───────────────────────────
  - type: web
    name: omnify-ai
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_URL
        fromService:
          name: omnify-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ─── Backend API (Node.js / Express) ─────────────────────────
  - type: web
    name: omnify-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        fromService:
          name: omnify-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CLOUDINARY_CLOUD_NAME
        value: djh1u7t0m
      - key: CLOUDINARY_API_KEY
        value: 583325635615298
      # ── Secrets: set these in the Render dashboard ────────────
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
